<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TorneApp - Panel de Control</title>
    <link rel="stylesheet" href="panel.css">
    
    <script src="panel.js" defer></script>
    <script type="module" src="database.js" defer></script>
</head>
<body>

    <div id="toast-container" class="toast-container"></div>
    <div id="error-modal" class="modal hidden">
        <div class="modal-content error-content">
            <span class="close-btn" onclick="closeErrorModal()">&times;</span>
            <h3 id="error-title">Error</h3>
            <p id="error-message">Mensaje de error aquí.</p>
        </div>
    </div>

    <header class="top-bar">
        <div class="bar-left">
            <button id="btn-users" class="icon-btn" title="Ver usuarios">👤 <span id="user-count">1</span></button>
            <div class="room-info">
                <span>ID: <strong id="room-id">D4JK9</strong></span>
                <button id="btn-copy-id" class="icon-btn small-btn" title="Copiar ID">📋</button>
                <span class="separator">|</span>
                <span>🔑: <strong id="room-pass">****</strong></span>
            </div>
        </div>
        <div class="bar-right">
            <select id="demo-role-switcher" class="demo-select hidden">
                <option value="owner">Vista: Owner</option>
                <option value="editor">Vista: Editor</option>
                <option value="viewer">Vista: Espectador</option>
            </select>
            
            <button id="btn-reset" class="action-btn warning-btn">Restablecer Paneles</button>
            <button id="btn-exit" class="action-btn danger-btn">Cerrar Sala</button>
        </div>
    </header>

    <div class="dashboard-container">
        <div class="left-column">
            
            <section class="panel" id="panel-divisas">
                <h2>1. Tasa de Cambio</h2>
                <div class="input-row">
                    <label>1 USD =</label>
                    <input type="number" id="tasa-cambio" placeholder="0.00" step="0.01">
                    <span id="moneda-local-label">Local</span>
                </div>
            </section>

            <section class="panel" id="panel-config">
                <h2>2. Configuración</h2>
                <div class="input-group">
                    <label>Costo de Entrada (USD)</label>
                    <div class="input-with-text">
                        <input type="number" id="costo-entrada-usd" placeholder="0.00">
                        <span class="converted-text">≈ <span id="costo-entrada-local">0.00</span> Local</span>
                    </div>
                </div>
                
                <div class="toggles-container">
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-group="modo" data-val="individual">Individual</button>
                        <button class="toggle-btn" data-group="modo" data-val="duos">Dúos</button>
                    </div>
                    <div class="toggle-group">
                        <button class="toggle-btn active" data-group="puntaje" data-val="kills">Kills</button>
                        <button class="toggle-btn" data-group="puntaje" data-val="posicion">Posición</button>
                    </div>
                </div>

                <div id="config-kills-extra" class="input-group">
                    <label>Pago por Kill (USD)</label>
                    <div class="input-with-text">
                        <input type="number" id="pago-kill-usd" placeholder="0.00">
                        <span class="converted-text">≈ <span id="pago-kill-local">0.00</span> Local</span>
                    </div>
                </div>
            </section>

            <section class="panel" id="panel-registro">
                <div class="panel-header-inline">
                    <h2>3. Registro</h2>
                    <button id="btn-deshacer" class="icon-btn small-btn" title="Deshacer última acción">↩️ Deshacer</button>
                </div>
                
                <form id="form-registro" onsubmit="event.preventDefault();">
                    <div class="input-row align-center">
                        <input type="color" id="equipo-color" value="#3b82f6" title="Color del equipo">
                        <input type="text" id="jugador-1" placeholder="Nombre Jugador 1" required>
                    </div>
                    <div id="input-jugador-2" class="input-row hidden">
                        <input type="text" id="jugador-2" placeholder="Nombre Jugador 2">
                    </div>

                    <div class="input-row mt-10">
                        <input type="number" id="input-puntaje" placeholder="Kills realizadas" required>
                    </div>
                    
                    <button type="submit" class="btn-primary mt-10">Añadir a Tabla</button>
                </form>
            </section>
        </div>

        <div class="right-column">
            
            <section class="panel table-panel" id="panel-tabla">
                <h2>Tabla de Resultados</h2>
                <div class="table-responsive">
                    <table id="resultados-table">
                        <thead>
                            <tr>
                                <th>Lugar</th>
                                <th>Nombre</th>
                                <th>Puntaje</th>
                                <th>Premio</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body">
                            <tr class="empty-row">
                                <td colspan="5">No hay registros aún.</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="finances-footer" id="finances-section">
                    <div class="finance-box">
                        <h4>Recaudación Total</h4>
                        <span class="amount" id="total-recaudado">0.00 USD</span>
                    </div>
                    <div class="finance-box highlight">
                        <h4>Ganancia Neta</h4>
                        <span class="amount" id="ganancia-neta">0.00 USD</span>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <button id="theme-toggle" class="theme-btn">🌙</button>

</body>
</html>
