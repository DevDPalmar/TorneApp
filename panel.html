<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TorneApp - Panel de Control</title>
    <link rel="stylesheet" href="panel.css">
    <script src="panel.js" defer></script> 
</head>
<body>

    <header class="top-bar">
        <div class="top-row">
            <button id="btn-usuarios" class="btn-top">
                👤 <span id="user-count">1</span> en sala
            </button>
            <div class="room-info">
                <span id="display-id">ID: DEMO</span> | <span id="display-pass">🔑: Sin PIN</span>
            </div>
        </div>
        <div class="action-row">
            <button id="btn-reset" class="btn-warning">Restablecer Paneles</button>
            <button id="btn-close" class="btn-danger">Cerrar Sala</button>
        </div>
    </header>

    <div class="app-wrapper">

        <section class="card-panel" id="panel-economia">
            <div class="panel-header">
                <h2>1. Cambio de Moneda</h2>
            </div>
            <div class="input-group">
                <label>Tasa de cambio actual:</label>
                <input type="number" id="valor-dolar" placeholder="Valor de 1 Dólar en moneda local" step="0.01">
            </div>
        </section>

        <section class="card-panel" id="panel-config">
            <div class="panel-header">
                <h2>2. Configuración del Torneo</h2>
            </div>
            
            <div class="input-group flex-row">
                <div class="flex-half">
                    <label>Entrada ($ USD):</label>
                    <input type="number" id="costo-entrada" placeholder="Costo de la entrada en $ USD" step="0.5">
                </div>
                <div class="flex-half result-box">
                    <label>Total Local:</label>
                    <span id="entrada-local" class="highlight-text">0.00</span>
                </div>
            </div>

            <label class="section-label">Modo de Juego</label>
            <div class="toggle-group" id="toggle-equipo">
                <button class="toggle-btn active" data-val="individual">Individual</button>
                <button class="toggle-btn" data-val="duos">Dúos</button>
            </div>

            <label class="section-label">Condición de Victoria</label>
            <div class="toggle-group" id="toggle-victoria">
                <button class="toggle-btn active" data-val="kills">Kills</button>
                <button class="toggle-btn" data-val="posicion">Posición</button>
            </div>

            <div class="input-group flex-row mt-10" id="caja-premio-kill">
                <div class="flex-half">
                    <label>Premio por Kill ($ USD):</label>
                    <input type="number" id="premio-kill" placeholder="Monto a pagar por cada kill en $ USD" step="0.5">
                </div>
                <div class="flex-half result-box">
                    <label>Equivalente:</label>
                    <span id="kill-local" class="highlight-text">0.00</span>
                </div>
            </div>
        </section>

        <section class="card-panel" id="panel-registro">
            <div class="panel-header">
                <h2>3. Registro de Jugadores</h2>
            </div>
            
            <div id="registro-container" class="registro-list">
                <div class="input-group flex-row player-row" id="player-row-inicial">
                    <input type="text" placeholder="Nombre del jugador" style="flex: 2;">
                    <input type="color" value="#0284c7" style="flex: 0.5; height: 42px; padding: 0;">
                    <input type="number" placeholder="Cant. Kills" style="flex: 1;">
                    <button class="btn-danger btn-del" style="padding: 10px; border: none; border-radius: 8px;">🗑️</button>
                </div>
            </div>
            
            <button id="btn-add-player" class="btn-primary mt-10">+ Añadir Participante</button>
        </section>

        <section class="card-panel" id="panel-resultados">
            <div class="panel-header">
                <h2>4. Tabla y Finanzas</h2>
            </div>
            
            <div id="tabla-resultados" class="tabla-list">
                <p class="empty-msg">Aún no hay resultados.</p>
            </div>

            <div class="finanzas-grid mt-10">
                <div class="finance-card bruto">
                    <h3>Recaudación Total</h3>
                    <p id="total-recaudado">0.00</p>
                    <small>Moneda Local</small>
                </div>
                <div class="finance-card neto">
                    <h3>Ganancia Neta</h3>
                    <p id="total-ganancia">0.00</p>
                    <small>Tras pagar premios</small>
                </div>
            </div>
        </section>

    </div>

    <div class="fab-container">
        <button id="demo-menu-btn" class="theme-fab demo-fab">🛠️</button>
        <button id="theme-toggle" class="theme-fab">🌙</button>
    </div>

</body>
</html>
