<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TorneApp - Panel de Control</title>
    
    <link rel="stylesheet" href="panel.css">
    
    <script src="panel.js" defer></script>
</head>
<body>

    <div class="panel-container">
        <header class="panel-header">
            <div class="header-info">
                <h1 id="panel-title">Panel de Torneo</h1>
                <span id="status-badge" class="badge">Cargando...</span>
            </div>
            <button id="exit-btn" class="btn-secondary">Salir</button>
        </header>

        <section class="room-info-card">
            <div class="info-item">
                <span class="label">ID de Sala:</span>
                <span id="display-room-id" class="value">--------</span>
            </div>
            <div class="info-item">
                <span class="label">Rol:</span>
                <span id="display-role" class="value">--------</span>
            </div>
        </section>

        <section id="admin-controls" class="admin-section" style="display: none;">
            <h3>Gestión de Torneo</h3>
            <div class="admin-actions">
                <button class="btn-action" onclick="abrirModalJugador()">Añadir Jugador</button>
                <button class="btn-action btn-start" onclick="iniciarTorneo()">Iniciar Torneo</button>
                <button class="btn-action btn-danger" onclick="finalizarTorneo()">Finalizar</button>
            </div>
        </section>

        <section class="tournament-content">
            <div class="content-header">
                <h2>Participantes</h2>
                <span id="player-count">0/0</span>
            </div>
            
            <div class="table-wrapper">
                <table id="players-table">
                    <thead>
                        <tr>
                            <th>Pos</th>
                            <th>Jugador</th>
                            <th>Puntos</th>
                            <th class="admin-only">Acción</th>
                        </tr>
                    </thead>
                    <tbody id="players-list">
                        </tbody>
                </table>
            </div>
        </section>

        <section class="matches-section">
            <h2>Próximos Encuentros</h2>
            <div id="matches-container" class="matches-grid">
                <p class="empty-msg">Esperando inicio del torneo...</p>
            </div>
        </section>
    </div>

    <button id="theme-toggle" class="theme-btn-float">🌙</button>

</body>
</html>
