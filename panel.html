<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TorneApp - Panel</title>
    <link rel="stylesheet" href="panel.css">
    <script src="panel.js" defer></script>
</head>
<body>

    <div class="app-wrapper">
        <header class="main-header">
            <div class="logo-area">
                <h1>TorneApp</h1>
                <span id="status-badge" class="status-dot">Modo Demo</span>
            </div>
            <button id="exit-btn" class="icon-btn">✕</button>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="stat-label">Sala ID</span>
                <span id="display-room-id" class="stat-value">---</span>
            </div>
            <div class="stat-card">
                <span class="stat-label">Mi Rol</span>
                <span id="display-role" class="stat-value">---</span>
            </div>
        </div>

        <section id="admin-controls" class="admin-panel" style="display: none;">
            <div class="admin-header">
                <h2>Gestión</h2>
            </div>
            <div class="action-buttons">
                <button class="btn-main" onclick="abrirModalJugador()">+ Jugador</button>
                <button class="btn-start" onclick="iniciarTorneo()">Iniciar</button>
            </div>
        </section>

        <section class="content-section">
            <div class="section-header">
                <h2>Participantes</h2>
                <span id="player-count" class="count-pill">0</span>
            </div>
            <div id="players-list" class="players-column">
                <p class="empty-msg">Cargando jugadores...</p>
            </div>
        </section>

        <section class="content-section">
            <h2>Duelos Actuales</h2>
            <div id="matches-container" class="matches-list">
                <p class="empty-msg">Esperando emparejamientos...</p>
            </div>
        </section>
    </div>

    <button id="theme-toggle" class="theme-fab">🌙</button>

</body>
</html>
